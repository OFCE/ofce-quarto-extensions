title: Format note OFCE
author: Paul Malliet & Xavier Timbeau
version: 0.3.0
quarto-required: ">=1.9.38"
contributes:
  formats:
    common:
    share-html:
      toc-location: left
      toc-title: Sur cette page
      number-sections: true
      number-depth: 3
      title-block-style: default
      template-partials:
        - html_template/title-metadata.html
        - html_template/title-block.html
    pdf:
      documentclass: scrreprt
      toc-depth: 1
      date-format: "D MMMM YYYY"
      pdffont: OpenSans
      number-sections: true
      number-depth: 3
      classoption:
        - DIV=11
        - twoside=semi
      papersize: a4
      fontsize: 9pt
      linestretch: 1.25
      extra_dependencies: ["float"]
      fig-dpi: 600
      fig-width: 5
      fig-format: png
      logo: logos/ofce_m.png
      logo2: logos/sciencespo.png
      template-partials:
        - pdf_template/title.tex
        - pdf_template/before-body.tex
    typst:
      mainfont: Open Sans
      keep-typ: true
      toc: false
      callout-icon: false
      papersize: a4
      logo: false
      number-sections: true
      section-numbering: "1.1.1"
      template-partials:
        - typst/typst-template.typ
        - typst/typst-show.typ
