title: Format OFCE pour le graphique de la semaine
author: Paul Malliet, Anissa Saumtally, Xavier Timbeau
version: 0.5.0
quarto-required: ">=1.9.38"
contributes:
  formats:
    common:
      toc: true
      lang: fr
      french: true
      authors-title: "Autrices, auteurs & résumé"
      language:
        fr:
          section-title-references: "Bibliograhie"
          title-block-author-single: "Par"
          title-block-author-plural: "Par"
          title-block-published: "Publié le"
          title-block-modified: "Modifié le"
          toc-title: "Sur cette page"
        en:
          section-title-references: "Bibilography"
          title-block-author-single: "Author"
          title-block-author-plural: "Authors"
          title-block-published: "Published on"
          title-block-modified: "Modified on"
          callout-tip-title: "Box"
          toc-title: "On this page"
      fig-asp: 0.61
      cap-location: top
      crossref:
        chapters: false
        fig-prefix: graphique
        tbl-prefix: tableau
        eq-prefix: équation
        sec-prefix: section
        tip-prefix: encadré
        fig-title: "**Graphique**"
        tip-title: "**Encadré**"
        title-delim: "**.**"
        tbl-title: "**Tableau**"
        lof-title: Graphiques
        lot-title: Tableaux
        fr:
          title-delim: "**.**"
        en:
          title-delim: "**.**"
      logo: ../ofce/img/logo.png
      collapse-callout:
        tip: true
      shortcodes:
        - fontawesome
      csl: ../ofce/csl/revue-francaise-de-gestion.csl
      filters:
        - extract-year.lua
        - quotes
        - collapse-callout
        - nbsp
        - quarto
      license: CC BY

    html:
      theme:
        - bootstrap
        - ../ofce-website/sass/default.scss
        - ../ofce-website/sass/rules.scss
        - ../ofce-website/ofce.scss
      number-sections: false
      html-math-method: katex
      include-in-header: 
        - ../ofce-website/url-nav-active.html
      lightbox: true
      link-external-icon: true
      mainfont: Open Sans
      toc-location: left
      toc-title: Sur cette page
      number-depth: 3
      fig-dpi: 1200
      fig-format: svg
      reference-location: margin
      fig-width: 6
      callout-icon: false
      logo: ../ofce-website/img/logo.png
      title-block-style: default
      image-lazy-loading: true
      hide-description: true
      template-partials:
        - html/title-block.html
        - html/title-metadata.html
      filters:
        - voir-aussi.lua

    typst:
      fig-dpi: 1200
      fig-format: svg
      mainfont: Open Sans
      keep-typ: false
      toc: false
      callout-icon: false
      papersize: a4
      section-numbering: 1.1.a
      logo: false
      template-partials:
        - typst/typst-template.typ
        - typst/typst-show.typ
