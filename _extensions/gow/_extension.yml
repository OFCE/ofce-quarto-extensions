title: Format OFCE pour le graphique de la semaine
author: Paul Malliet, Anissa Saumtally, Xavier Timbeau
version: 0.5.0
quarto-required: ">=1.9.36"
contributes:
  formats:
    common:
      crossref:
        fr:
          title-delim: "**.**"
        en:
          title-delim: "**.**"
      filters:
        - extract-year.lua
        - quotes
        - collapse-callout
        - nbsp
        - quarto
        - comments

    share-html:
      number-sections: false
      html-math-method: katex
      fig-dpi: 600
      fig-format: svg
      reference-location: margin
      callout-icon: false
      lightbox: true
      hide-description: true
      template-partials:
        - html/title-block.html
        - html/title-metadata.html
      filters:
        - voir-aussi.lua
    typst:
      fig-dpi: 600
      fig-format: svg
      mainfont: Helvetica Neue
      keep-typ: false
      toc: false
      callout-icon: false
      papersize: a4
      section-numbering: 1.1.a
      logo: false
      template-partials:
        - typst/typst-template.typ
        - typst/typst-show.typ
