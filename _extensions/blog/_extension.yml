title: Format OFCE pour le site du blog
author: Paul Malliet, Anissa Saumtally, Xavier Timbeau
version: 0.4.0
quarto-required: ">=1.8.26"
contributes:
  formats:
    common:
      crossref:
        fr:
          title-delim: "**.**"
        en:
          title-delim: "**.**"
      filters:
        - quotes
        - collapse-callout
        - nbsp
        - quarto
        - comments
      shortcodes:
        - fontawesome
      collapse-callout:
        tip: true
    share-html:
      number-sections: false
      fig-dpi: 600
      fig-format: svg
      reference-location: margin
      callout-icon: false
      lightbox: true
      hide-description: true
      template-partials:
        - html/title-metadata.html
    typst:
      mainfont: Arial
      keep-typ: true
      toc: false
      callout-icon: false
      papersize: a4
      section-numbering: 1.1.a
      citeproc: true
      logo: false
      template-partials:
        - typst/typst-template.typ
        - typst/typst-show.typ
