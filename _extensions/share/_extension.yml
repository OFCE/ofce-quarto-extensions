title: Format OFCE commun
author: Anissa Saumtally et Xavier Timbeau
version: 0.3.0
quarto-required: ">=1.9.38"
contributes:
  formats:
    common:
      toc: true
      lang: fr
      french: true
      authors-title: "Autrices, auteurs & résumé"
      language:
        fr:
          section-title-references: "Bibliograhie"
          title-block-author-single: "Par"
          title-block-author-plural: "Par"
          title-block-published: "Publié le"
          title-block-modified: "Modifié le"
          toc-title: "Sur cette page"
        en:
          section-title-references: "Bibilography"
          title-block-author-single: "Author"
          title-block-author-plural: "Authors"
          title-block-published: "Published on"
          title-block-modified: "Modified on"
          launch-dev-container-title: "OFCE working paper"
          callout-tip-title: "Box"
          toc-title: "On this page"
      fig-asp: 0.61
      cap-location: top
      crossref:
        chapters: false
        fig-prefix: graphique
        tbl-prefix: tableau
        eq-prefix: équation
        sec-prefix: section
        tip-prefix: encadré
        fig-title: "**Graphique**"
        tip-title: "**Encadré**"
        title-delim: "**.**"
        tbl-title: "**Tableau**"
        lof-title: Graphiques
        lot-title: Tableaux
      logo: ofce_m.png
      filters:
        - nameref
        - fr-nbsp
        - quotes
        - collapse-callout
      collapse-callout:
        tip: true
      shortcodes:
        - fontawesome
        - downloadthis
      csl: csl/revue-francaise-de-gestion.csl
    html:
      theme:
        - bootstrap
        - sass/default.scss
        - sass/rules.scss
        - ofce.scss
      include-in-header: 
        - url-nav-active.html
      lightbox: true
      link-external-icon: true
      mainfont: Open Sans
      toc-location: left
      toc-title: Sur cette page
      number-sections: true
      number-depth: 3
      html-math-method: katex
      fig-dpi: 1200
      fig-format: svg
      reference-location: margin
      fig-width: 6
      callout-icon: false
      logo: ofce_m.png
      title-block-style: default
      image-lazy-loading: true

    pdf:
      documentclass: scrartcl
      toc-depth: 1
      pdffont: OpenSans
      number-sections: true
      number-depth: 3
      classoption:
        - DIV=11
      papersize: a4
      fontsize: 9pt
      extra_dependencies: ["float"]
      fig-dpi: 1200
      fig-width: 5
      fig-format: svg
      logo: ofce_m.png
      logo2: sciencespo.png
