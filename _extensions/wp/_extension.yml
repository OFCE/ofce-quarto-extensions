title: Format document de travail OFCE
author: Anissa Saumtally et Xavier Timbeau
version: 0.3.14
quarto-required: ">=1.9.38"
contributes:
  formats:
    common:
      filters:
        - wordcount
        - nameref
        - quotes
        - fr-nbsp
        - collapse-callout
      quot-lang: fr
      collapse-callout:
        tip: true
      shortcodes:
        - fontawesome
        - downloadthis
      google-scholar: true
      appendix-style: default
      appendix-cite-as: [display, bibtex]
      license: CC BY
    share-html:
      fig-dpi: 600
      fig-format: png
      fig-width: 6
      reference-location: margin
      callout-icon: false
      lightbox: true
      title-block-style: default
      link-external-icon: true
      template-partials:
        - html/title-block.html
        - html/title-metadata.html
        - html/toc.html
    pdf:
      toc-depth: 1
      date-format: "D MMMM YYYY"
      pdffont: OpenSans
      number-sections: true
      number-depth: 3
      geometry:
        - top = 3cm
        - bottom = 2.5cm
        - left = 2.5cm
        - right = 2.5cm
      linestretch: 1.25
      extra_dependencies: ["float"]
      fig-dpi: 600
      fig-width: 5
      fig-format: svg
      callout-icon: false
      template-partials:
        - pdf/before-title.tex
        - pdf/title.tex
        - pdf/before-body.tex
        - pdf/after-body.tex
        - pdf/toc.tex
        - pdf/biblio.tex
    typst:
      mainfont: Arial
      keep-typ: true
      toc: false
      callout-icon: false
      section-numbering: 1.1.a
      citeproc: true
      papersize: a4
      logo: false
      template-partials:
        - typst/typst-template.typ
        - typst/typst-show.typ
